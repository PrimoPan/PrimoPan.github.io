base_info:
  title: PrimoPan's Blog
  author: Primo Pan
language: en
index_generator:
  path: ''
  per_page: 10
  order_by: '-date'
post_asset_folder: true
meta_generator: true
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: mtime
per_page: 10
pagination_dir: page
search:
  path: search.json
  field: post
  content: true
  format: striptags
theme: keep-local
mathjax:
  tags: none
  single_dollars: true
  cjk_width: 0.9
  normal_width: 0.6
  append_css: true
  every_page: true
deploy:
  type: git
  repository: git@github.com:PrimoPan/PrimoPan.github.io.git
  branch: main
skip_render:
  - about/assets/**
root: /en/
source_dir: source_en
public_dir: public/en
